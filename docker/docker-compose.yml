# ============================================================
# SEGALLA - SISTEMA DE ORÇAMENTOS
# Docker Compose Configuration
# ============================================================
# Uso: docker-compose -f docker/docker-compose.yml up -d
# Parar: docker-compose -f docker/docker-compose.yml down

version: '3.8'

services:
  # ─── BANCO DE DADOS ────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: segalla-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-segalla_orcamentos}
      MYSQL_USER: ${MYSQL_USER:-segalla_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-segalla_password}
      MYSQL_INITDB_SKIP_TZINFO: "yes"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seeds.sql:/docker-entrypoint-initdb.d/02-seeds.sql
    networks:
      - segalla-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # ─── APLICAÇÃO ─────────────────────────────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: segalla-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: mysql://${MYSQL_USER:-segalla_user}:${MYSQL_PASSWORD:-segalla_password}@mysql:3306/${MYSQL_DATABASE:-segalla_orcamentos}
      
      # Firebird Configuration
      FIREBIRD_HOST: ${FIREBIRD_HOST:-localhost}
      FIREBIRD_PORT: ${FIREBIRD_PORT:-3050}
      FIREBIRD_DATABASE: ${FIREBIRD_DATABASE:-/dados/estoque.fdb}
      FIREBIRD_USER: ${FIREBIRD_USER:-SYSDBA}
      FIREBIRD_PASSWORD: ${FIREBIRD_PASSWORD:-masterkey}
      FIREBIRD_CHARSET: ${FIREBIRD_CHARSET:-WIN1252}
      
      # Firebird Tables
      FIREBIRD_TABLE_PRODUCTS: ${FIREBIRD_TABLE_PRODUCTS:-TESTPRODUTOGERAL}
      FIREBIRD_TABLE_STOCK: ${FIREBIRD_TABLE_STOCK:-TESTEESTOQUE}
      FIREBIRD_TABLE_PRICES: ${FIREBIRD_TABLE_PRICES:-TESTPRODUTO}
      FIREBIRD_TABLE_BRANDS: ${FIREBIRD_TABLE_BRANDS:-TESTMARCA}
      
      # Firebird Fields
      FIREBIRD_FIELD_PRODUCT_CODE: ${FIREBIRD_FIELD_PRODUCT_CODE:-CODIGO}
      FIREBIRD_FIELD_PRODUCT_NAME: ${FIREBIRD_FIELD_PRODUCT_NAME:-DESCRICAO}
      FIREBIRD_FIELD_STOCK_CODE: ${FIREBIRD_FIELD_STOCK_CODE:-CODIGO}
      FIREBIRD_FIELD_STOCK_BRAND_CODE: ${FIREBIRD_FIELD_STOCK_BRAND_CODE:-CODIGO_MARCA}
      FIREBIRD_FIELD_STOCK_QUANTITY: ${FIREBIRD_FIELD_STOCK_QUANTITY:-ESTOQUE}
      FIREBIRD_FIELD_PRICE_CODE: ${FIREBIRD_FIELD_PRICE_CODE:-CODIGO}
      FIREBIRD_FIELD_PRICE_VALUE: ${FIREBIRD_FIELD_PRICE_VALUE:-VALOR}
      FIREBIRD_FIELD_BRAND_CODE: ${FIREBIRD_FIELD_BRAND_CODE:-CODIGO}
      FIREBIRD_FIELD_BRAND_NAME: ${FIREBIRD_FIELD_BRAND_NAME:-NOME}
      
      # Security
      JWT_SECRET: ${JWT_SECRET:-sua_chave_secreta_muito_segura_aqui_com_minimo_32_caracteres}
      
      # Company Info
      COMPANY_NAME: ${COMPANY_NAME:-Segalla Peças Automotivas}
      COMPANY_TAGLINE: ${COMPANY_TAGLINE:-Qualidade e confiança para sua oficina}
      COMPANY_PHONE: ${COMPANY_PHONE:-(11) 3000-0000}
      COMPANY_EMAIL: ${COMPANY_EMAIL:-contato@segalla.com.br}
      COMPANY_ADDRESS: ${COMPANY_ADDRESS:-Rua das Peças, 123 - São Paulo/SP}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups
    networks:
      - segalla-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─── NGINX (REVERSE PROXY) ────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: segalla-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - segalla-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ─── VOLUMES ───────────────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local

# ─── NETWORKS ──────────────────────────────────────────────────────────────
networks:
  segalla-network:
    driver: bridge

# ─── INSTRUÇÕES ────────────────────────────────────────────────────────────
# Iniciar containers:
#   docker-compose -f docker/docker-compose.yml up -d
#
# Ver logs:
#   docker-compose -f docker/docker-compose.yml logs -f app
#
# Parar containers:
#   docker-compose -f docker/docker-compose.yml down
#
# Remover volumes (CUIDADO - deleta dados!):
#   docker-compose -f docker/docker-compose.yml down -v
#
# Executar comando no container:
#   docker-compose -f docker/docker-compose.yml exec app bash
#
# Fazer backup do banco:
#   docker-compose -f docker/docker-compose.yml exec mysql mysqldump -u segalla_user -p segalla_orcamentos > backup.sql
