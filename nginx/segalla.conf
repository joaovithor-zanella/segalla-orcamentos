# ============================================================
# SEGALLA - SISTEMA DE ORÇAMENTOS
# Nginx Configuration
# ============================================================
# Copie para: /etc/nginx/sites-available/segalla
# Ative com: sudo ln -s /etc/nginx/sites-available/segalla /etc/nginx/sites-enabled/
# Teste com: sudo nginx -t
# Recarregue com: sudo systemctl reload nginx

# ─── HTTP (redirecionar para HTTPS) ────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name seu_dominio.com.br www.seu_dominio.com.br;

    # Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirecionar para HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ─── HTTPS ─────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name seu_dominio.com.br www.seu_dominio.com.br;

    # ─── SSL CERTIFICATES ─────────────────────────────────────────────────
    ssl_certificate /etc/letsencrypt/live/seu_dominio.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seu_dominio.com.br/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/seu_dominio.com.br/chain.pem;

    # ─── SSL CONFIGURATION ────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!3DES;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # ─── SECURITY HEADERS ─────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ─── LOGGING ───────────────────────────────────────────────────────────
    access_log /var/log/nginx/segalla-access.log combined;
    error_log /var/log/nginx/segalla-error.log warn;

    # ─── GZIP COMPRESSION ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # ─── CLIENT LIMITS ────────────────────────────────────────────────────
    client_max_body_size 20M;
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 15;
    send_timeout 10;

    # ─── UPSTREAM ─────────────────────────────────────────────────────────
    upstream segalla_app {
        least_conn;
        server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ─── HEALTH CHECK ─────────────────────────────────────────────────────
    location /health {
        access_log off;
        proxy_pass http://segalla_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ─── API ROUTES ────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://segalla_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ─── STATIC FILES (CACHE) ─────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://segalla_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_cache_valid 200 1d;
        proxy_cache_bypass $http_pragma $http_authorization;
        add_header Cache-Control "public, max-age=86400, immutable";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ─── MAIN APPLICATION ────────────────────────────────────────────────
    location / {
        proxy_pass http://segalla_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ─── DENY ACCESS TO SENSITIVE FILES ────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ─── REDIRECT WWW TO NON-WWW (OPCIONAL) ────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.seu_dominio.com.br;

    ssl_certificate /etc/letsencrypt/live/seu_dominio.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seu_dominio.com.br/privkey.pem;

    return 301 https://seu_dominio.com.br$request_uri;
}
